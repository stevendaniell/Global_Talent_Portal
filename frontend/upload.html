<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | Global Talent Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <i class="fa-solid fa-globe"></i> GlobalTalent
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="search.html">Find Talent</a>
            <a href="upload.html" class="active">Upload Resume</a>
        </nav>
        <div class="auth-buttons">
            <button class="btn-primary" onclick="login()"><i class="fa-brands fa-microsoft"></i> Sign in with Entra ID</button>
        </div>
    </header>

    <main style="padding: 5rem 5%;">
        <div class="form-container">
            <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Join the Network</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Upload your resume to share your profile with top cloud recruiters.</p>
            
            <form id="uploadForm" onsubmit="handleUpload(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="E.g., Ada Lovelace">
                </div>
                
                <div class="form-group">
                    <label for="title">Professional Title</label>
                    <input type="text" id="title" required placeholder="E.g., Senior DevOps Engineer">
                </div>
                
                <div class="form-group">
                    <label for="skills">Key Skills (Comma Separated)</label>
                    <input type="text" id="skills" required placeholder="E.g., Java, Spring Boot, Azure, CI/CD">
                </div>
                
                <div class="form-group">
                    <label for="resume">Resume PDF</label>
                    <div style="border: 2px dashed var(--surface-border); padding: 2rem; border-radius: 8px; text-align: center; background: rgba(13, 17, 23, 0.5); margin-top: 0.5rem; cursor: pointer;" onclick="document.getElementById('resume').click()">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                        <p>Click to select PDF or drag and drop</p>
                    </div>
                    <input type="file" id="resume" accept=".pdf" style="display: none;" onchange="updateFileName(this)">
                    <p id="fileName" style="margin-top: 0.5rem; color: var(--text-muted); font-size: 0.9rem;"></p>
                </div>
                
                <button type="submit" class="btn-primary btn-large" style="width: 100%; justify-content: center; margin-top: 2rem;"><i class="fa-solid fa-upload"></i> Complete Profile</button>
            </form>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        function updateFileName(input) {
            if (input.files && input.files.length > 0) {
                document.getElementById('fileName').innerHTML = '<i class="fa-solid fa-file-pdf" style="color: #ff5e5e;"></i> ' + input.files[0].name;
            }
        }
    </script>
</body>
</html>
