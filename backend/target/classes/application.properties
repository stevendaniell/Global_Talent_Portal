spring.application.name=GlobalTalentPortal

# Azure Cosmos DB properties
spring.cloud.azure.cosmos.endpoint=https://<your-cosmos-db-account-name>.documents.azure.com:443/
spring.cloud.azure.cosmos.key=<your-cosmos-db-key>
spring.cloud.azure.cosmos.database=TalentDB
spring.cloud.azure.cosmos.populate-query-metrics=true

# Azure Storage properties
spring.cloud.azure.storage.blob.endpoint=https://<your-storage-account-name>.blob.core.windows.net/
# (Identity or connection string can also be configured here)

# Entra ID Authentication (can be handled on frontend via Azure Static Web Apps, but here for backend protection)
spring.cloud.azure.active-directory.enabled=true
spring.cloud.azure.active-directory.profile.tenant-id=<your-tenant-id>
spring.cloud.azure.active-directory.credential.client-id=<your-client-id>
spring.cloud.azure.active-directory.credential.client-secret=<your-client-secret>

# Server port matching frontend proxy
server.port=8080

# CORS settings for local development
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
